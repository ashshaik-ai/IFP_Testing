name: Mobile visual tests
# Runs Playwright across 4 device profiles on every push to testing.
# Screenshots are uploaded as a downloadable artifact (Actions → run → Artifacts).

on:
  push:
    branches: [testing]
  workflow_dispatch:

concurrency:
  group: mobile-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run full test suite (all 4 device profiles)
        run: npx playwright test --reporter=github,html
        env:
          CI: true

      - name: Upload mobile screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-screenshots-${{ github.sha }}
          path: playwright-screenshots/
          retention-days: 30

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 14
