services:
  backend:
    build: ./voter-list-tool/backend
    restart: always
    volumes:
      - voter_data:/app/data          # persistent — survives restarts/redeploys
    environment:
      VOTER_APP_CODES: "ifp-private-2026"
      VOTER_APP_SECRET: "CHANGE_THIS_TO_A_RANDOM_SECRET"
      VOTER_CORS_ORIGINS: "*"         # Caddy is the only public entry point
      VOTER_DEMO_OCR: "true"          # data already processed; skip OCR on upload
      VOTER_OCR_PROVIDER: "local"
      TESSERACT_CMD: "/usr/bin/tesseract"
      TESSDATA_PREFIX: "/usr/share/tesseract-ocr/4.00/tessdata"
    expose:
      - "8000"

  frontend:
    build: ./voter-list-tool/frontend
    restart: always
    expose:
      - "3000"
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  voter_data:
  caddy_data:
  caddy_config:
