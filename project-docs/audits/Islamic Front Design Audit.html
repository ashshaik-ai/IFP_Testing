document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

scaleX(0);}to{transform:scaleX(1);}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-screen-label=\"Design Audit\" style=\"font-family:'DM Sans','Noto Sans Telugu',sans-serif;background:#faf6ee;color:#1a1208;-webkit-font-smoothing:antialiased;overflow-x:hidden;\">\n\n  <!-- ============ COVER ============ -->\n  <section data-screen-label=\"Cover\" style=\"position:relative;background:linear-gradient(165deg,#0d3b1e 0%,#0a2e17 55%,#08230f 100%);color:#fff;padding:clamp(64px,9vw,120px) 6vw clamp(56px,7vw,96px);overflow:hidden;\">\n    <img src=\"eb4de4d4-7e49-4b5f-96fd-70d7c22228af\" alt=\"\" style=\"position:absolute;top:50%;right:-8%;width:min(560px,62vw);transform:translateY(-50%);opacity:.05;pointer-events:none;\">\n    <div style=\"position:relative;max-width:1040px;margin:0 auto;\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:clamp(40px,7vw,72px);\">\n        <img src=\"eb4de4d4-7e49-4b5f-96fd-70d7c22228af\" alt=\"Islamic Front emblem\" style=\"width:46px;height:46px;object-fit:contain;\">\n        <div style=\"line-height:1.25;\">\n          <div style=\"font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:#e8b84b;letter-spacing:.3px;\">Islamic Front — Mangalagiri<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:rgba(232,184,75,.6);\">Independent Design Review<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:rgba(232,184,75,.75);margin-bottom:22px;\">Confidential · June 2026<\u002Fdiv>\n      <h1 style=\"font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(44px,8vw,104px);line-height:1.02;letter-spacing:-.01em;margin-bottom:24px;\">\n        The Premium<br><span style=\"font-style:italic;font-weight:400;color:#e8b84b;\">Standard<\u002Fspan> Audit\n      <\u002Fh1>\n      <p style=\"font-family:'Playfair Display',serif;font-style:italic;font-weight:400;font-size:clamp(18px,2.4vw,27px);line-height:1.5;color:rgba(245,230,192,.82);max-width:680px;\">\n        A brutal, unbiased review of the Islamic Front website measured against the bar set by Apple, Stripe, Linear, Notion, Airbnb &amp; Tesla — and a roadmap to close the gap.\n      <\u002Fp>\n\n      <!-- score + verdict row -->\n      <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:clamp(28px,5vw,64px);margin-top:clamp(48px,7vw,80px);padding-top:clamp(40px,5vw,56px);border-top:1px solid rgba(200,146,42,.22);\">\n        <div style=\"display:flex;align-items:center;gap:26px;\">\n          <div style=\"position:relative;width:148px;height:148px;border-radius:50%;background:conic-gradient(#e8b84b 0deg 244.8deg, rgba(255,255,255,.08) 244.8deg 360deg);display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n            <div style=\"position:absolute;inset:11px;border-radius:50%;background:#0a2e17;display:flex;flex-direction:column;align-items:center;justify-content:center;\">\n              <div style=\"font-family:'Playfair Display',serif;font-weight:900;font-size:46px;color:#fff;line-height:1;\">68<\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(232,184,75,.7);margin-top:3px;\">/ 100<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(232,184,75,.7);margin-bottom:8px;\">Overall Score<\u002Fdiv>\n            <div style=\"font-family:'Playfair Display',serif;font-size:22px;font-weight:700;line-height:1.2;color:#fff;\">Strong, coherent —<br>not yet world-class<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:240px;max-width:380px;\">\n          <p style=\"font-size:14.5px;line-height:1.7;color:rgba(245,230,192,.72);\">\n            The engineering is genuinely impressive. The <em style=\"color:#e8b84b;font-style:normal;\">restraint, emotional focus and editorial confidence<\u002Fem> that make a site feel premium are what's missing — and they are fixable.\n          <\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ THE PANEL ============ -->\n  <section style=\"background:#08230f;color:#fff;padding:clamp(40px,5vw,60px) 6vw;border-top:1px solid rgba(200,146,42,.14);\">\n    <div style=\"max-width:1040px;margin:0 auto;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(232,184,75,.6);margin-bottom:22px;\">Reviewed by an 8-discipline panel<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:1px;background:rgba(200,146,42,.16);border:1px solid rgba(200,146,42,.16);border-radius:12px;overflow:hidden;\">\n        <sc-for list=\"{{ panel }}\" as=\"p\" hint-placeholder-count=\"8\">\n          <div style=\"background:#0a2e17;padding:18px 20px;\">\n            <div style=\"font-size:13.5px;font-weight:600;color:#fff;line-height:1.35;\">{{ p.role }}<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:rgba(245,230,192,.5);margin-top:4px;line-height:1.4;\">{{ p.lens }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <p style=\"font-size:12.5px;color:rgba(245,230,192,.4);margin-top:18px;line-height:1.6;max-width:680px;\">\n        Method — grounded in the real shipped markup, tokens, breakpoints, components and brand assets across all 22 pages, cross-checked against the team's own June self-audit (72/100). Scores weight the <em style=\"color:rgba(232,184,75,.65);font-style:normal;\">premium &amp; emotional<\u002Fem> axes harder, per the brief's benchmark.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SCORECARD ============ -->\n  <section data-screen-label=\"Scorecard\" style=\"background:#faf6ee;padding:clamp(64px,8vw,112px) 6vw;\">\n    <div style=\"max-width:1040px;margin:0 auto;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#c8922a;margin-bottom:14px;\">Category Scorecard<\u002Fdiv>\n      <h2 style=\"font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(30px,4.5vw,52px);line-height:1.08;letter-spacing:-.01em;margin-bottom:14px;color:#0d3b1e;\">Where it stands today<\u002Fh2>\n      <p style=\"font-size:15.5px;line-height:1.7;color:#5c4a28;max-width:620px;margin-bottom:clamp(40px,5vw,56px);\">Seven axes, scored against the reference set. Accessibility and performance already punch above their weight; first impression and premium feel are the drag.<\u002Fp>\n\n      <div style=\"display:flex;flex-direction:column;gap:22px;\">\n        <sc-for list=\"{{ scores }}\" as=\"s\" hint-placeholder-count=\"7\">\n          <div>\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;\">\n              <span style=\"font-family:'Playfair Display',serif;font-size:clamp(18px,2.4vw,23px);font-weight:600;color:#0d3b1e;\">{{ s.name }}<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:#9a7320;\"><b style=\"color:#0d3b1e;font-size:20px;\">{{ s.val }}<\u002Fb> / 100<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"height:9px;background:rgba(13,59,30,.07);border-radius:100px;overflow:hidden;\">\n              <div style=\"height:100%;width:{{ s.pct }};background:linear-gradient(90deg,#1a5c30,#c8922a);border-radius:100px;transform-origin:left;animation:auGrow 1.1s cubic-bezier(.22,.61,.36,1) both;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:13px;color:#7a6840;margin-top:8px;line-height:1.5;\">{{ s.note }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ EXECUTIVE SUMMARY ============ -->\n  <section data-screen-label=\"Executive Summary\" style=\"background:#0d3b1e;color:#fff;padding:clamp(64px,8vw,112px) 6vw;\">\n    <div style=\"max-width:1040px;margin:0 auto;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#e8b84b;margin-bottom:16px;\">Executive Summary<\u002Fdiv>\n      <h2 style=\"font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(28px,4vw,46px);line-height:1.15;letter-spacing:-.01em;max-width:840px;margin-bottom:clamp(36px,5vw,52px);\">\n        You have built something <span style=\"font-style:italic;color:#e8b84b;\">rare for its category<\u002Fspan> — and you are one layer of restraint away from something exceptional.\n      <\u002Fh2>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:clamp(28px,4vw,56px);\">\n        <div>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(120,220,150,.85);margin-bottom:18px;\">✓ What's already very good<\u002Fdiv>\n          <ul style=\"list-style:none;display:flex;flex-direction:column;gap:16px;\">\n            <sc-for list=\"{{ strengths }}\" as=\"t\" hint-placeholder-count=\"5\">\n              <li style=\"font-size:14.5px;line-height:1.65;color:rgba(245,230,192,.82);padding-left:18px;position:relative;\">\n                <span style=\"position:absolute;left:0;top:1px;color:#5cc97f;\">—<\u002Fspan>{{ t }}\n              <\u002Fli>\n            <\u002Fsc-for>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(232,184,75,.85);margin-bottom:18px;\">△ What holds it back<\u002Fdiv>\n          <ul style=\"list-style:none;display:flex;flex-direction:column;gap:16px;\">\n            <sc-for list=\"{{ weaknesses }}\" as=\"t\" hint-placeholder-count=\"5\">\n              <li style=\"font-size:14.5px;line-height:1.65;color:rgba(245,230,192,.82);padding-left:18px;position:relative;\">\n                <span style=\"position:absolute;left:0;top:1px;color:#e8b84b;\">—<\u002Fspan>{{ t }}\n              <\u002Fli>\n            <\u002Fsc-for>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ THE 10 AUDITS ============ -->\n  <section data-screen-label=\"Audit Areas\" style=\"background:#faf6ee;padding:clamp(56px,7vw,96px) 6vw clamp(40px,5vw,64px);\">\n    <div style=\"max-width:1040px;margin:0 auto;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#c8922a;margin-bottom:14px;\">The Ten Audits<\u002Fdiv>\n      <h2 style=\"font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(30px,4.5vw,52px);line-height:1.08;letter-spacing:-.01em;color:#0d3b1e;\">Area by area, brutally honest<\u002Fh2>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"max-width:1040px;margin:0 auto;padding:0 6vw clamp(40px,6vw,72px);\">\n    <sc-for list=\"{{ audits }}\" as=\"a\" hint-placeholder-count=\"10\">\n      <article style=\"border-top:1px solid rgba(200,146,42,.28);padding:clamp(36px,5vw,56px) 0;\">\n        <div style=\"display:flex;gap:clamp(20px,4vw,48px);flex-wrap:wrap;\">\n          <div style=\"flex:0 0 auto;width:clamp(56px,9vw,110px);\">\n            <div style=\"font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(34px,6vw,72px);color:rgba(13,59,30,.13);line-height:.9;\">{{ a.num }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;min-width:280px;\">\n            <div style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px;\">\n              <h3 style=\"font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(21px,3vw,30px);color:#0d3b1e;line-height:1.15;\">{{ a.title }}<\u002Fh3>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:{{ a.color }};background:{{ a.bg }};border:1px solid {{ a.color }};padding:4px 12px;border-radius:100px;white-space:nowrap;\">{{ a.score }} / 10<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-size:15px;line-height:1.72;color:#3d3018;margin-bottom:20px;max-width:680px;\">{{ a.body }}<\u002Fp>\n            <div style=\"display:flex;flex-direction:column;gap:10px;\">\n              <sc-for list=\"{{ a.points }}\" as=\"pt\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;gap:11px;font-size:13.5px;line-height:1.6;color:#5c4a28;\">\n                  <span style=\"flex:0 0 auto;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:{{ pt.tcolor }};background:{{ pt.tbg }};padding:3px 8px;border-radius:5px;height:fit-content;margin-top:1px;white-space:nowrap;\">{{ pt.tag }}<\u002Fspan>\n                  <span><b style=\"color:#0d3b1e;\">{{ pt.head }}<\u002Fb> {{ pt.text }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- ============ ROADMAP / RANKED ============ -->\n  <section data-screen-label=\"Roadmap\" style=\"background:#0d3b1e;color:#fff;padding:clamp(64px,8vw,112px) 6vw;\">\n    <div style=\"max-width:1040px;margin:0 auto;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#e8b84b;margin-bottom:14px;\">The Roadmap · 68 → 92<\u002Fdiv>\n      <h2 style=\"font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(28px,4.2vw,48px);line-height:1.1;letter-spacing:-.01em;margin-bottom:14px;\">Ranked by impact<\u002Fh2>\n      <p style=\"font-size:15px;line-height:1.7;color:rgba(245,230,192,.7);max-width:620px;margin-bottom:clamp(40px,5vw,56px);\">Thirty moves, grouped into three priority tiers. The P0 tier alone — mostly editorial and additive — gets you most of the way to feeling premium.<\u002Fp>\n\n      <sc-for list=\"{{ tiers }}\" as=\"tier\" hint-placeholder-count=\"3\">\n        <div style=\"margin-bottom:clamp(36px,5vw,52px);\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:#0d3b1e;background:{{ tier.color }};padding:5px 13px;border-radius:6px;\">{{ tier.tag }}<\u002Fspan>\n            <span style=\"font-family:'Playfair Display',serif;font-size:clamp(18px,2.4vw,24px);font-weight:600;color:#fff;\">{{ tier.title }}<\u002Fspan>\n            <span style=\"font-size:12.5px;color:rgba(245,230,192,.5);\">{{ tier.meta }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;\">\n            <sc-for list=\"{{ tier.items }}\" as=\"it\" hint-placeholder-count=\"8\">\n              <div style=\"display:flex;gap:16px;align-items:baseline;padding:13px 0;border-top:1px solid rgba(200,146,42,.16);\">\n                <span style=\"flex:0 0 auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:rgba(232,184,75,.55);width:26px;\">{{ it.n }}<\u002Fspan>\n                <span style=\"flex:1;font-size:14.5px;line-height:1.55;color:rgba(245,230,192,.88);\">{{ it.text }}<\u002Fspan>\n                <span style=\"flex:0 0 auto;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:rgba(232,184,75,.6);white-space:nowrap;\">{{ it.effort }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ VERDICT ============ -->\n  <section data-screen-label=\"Final Verdict\" style=\"position:relative;background:linear-gradient(165deg,#08230f,#0a2e17);color:#fff;padding:clamp(64px,9vw,120px) 6vw;overflow:hidden;\">\n    <img src=\"eb4de4d4-7e49-4b5f-96fd-70d7c22228af\" alt=\"\" style=\"position:absolute;bottom:-12%;left:-6%;width:min(440px,52vw);opacity:.045;pointer-events:none;\">\n    <div style=\"position:relative;max-width:880px;margin:0 auto;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(232,184,75,.75);margin-bottom:24px;\">Final Verdict<\u002Fdiv>\n      <p style=\"font-family:'Playfair Display',serif;font-style:italic;font-weight:400;font-size:clamp(24px,4vw,44px);line-height:1.32;letter-spacing:-.01em;color:#fff;margin-bottom:32px;\">\n        “Not yet the world's most premium community website — but already the most ambitious one in its category, and the only thing standing between it and that title is <span style=\"color:#e8b84b;\">the courage to remove, not add.<\u002Fspan>”\n      <\u002Fp>\n      <p style=\"font-size:15.5px;line-height:1.75;color:rgba(245,230,192,.78);margin-bottom:20px;\">\n        A first-time visitor <b style=\"color:#fff;\">would trust this organisation<\u002Fb> — the founder is named and shown, the manifesto is downloadable, schemes and candidates are real. What they would <em style=\"color:#e8b84b;font-style:normal;\">not yet<\u002Fem> feel is the calm, effortless confidence of an Apple or Stripe page, because the site is currently trying to say everything at once: 15 homepage sections, gold ornament on every surface, emoji icons, and placeholder media all competing for the same five seconds of attention.\n      <\u002Fp>\n      <p style=\"font-size:15.5px;line-height:1.75;color:rgba(245,230,192,.78);\">\n        Premium is not a colour or a font — you already have a beautiful palette and a disciplined token system. Premium is <b style=\"color:#fff;\">editing<\u002Fb>: one idea per screen, generous silence around it, real photography instead of placeholders, and motion that rewards rather than decorates. Execute the P0 tier and this moves from <b style=\"color:#e8b84b;\">68 to the low 80s<\u002Fb> in roughly a week of focused work. The foundation is already world-class engineering — it now needs world-class taste laid on top.\n      <\u002Fp>\n      <div style=\"margin-top:clamp(44px,6vw,64px);padding-top:28px;border-top:1px solid rgba(200,146,42,.2);display:flex;align-items:center;gap:14px;\">\n        <img src=\"eb4de4d4-7e49-4b5f-96fd-70d7c22228af\" alt=\"\" style=\"width:34px;height:34px;object-fit:contain;opacity:.85;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px;color:rgba(232,184,75,.55);\">END OF AUDIT · ISLAMIC FRONT, MANGALAGIRI · JUNE 2026<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    const P0 = '#5cc97f', HI = '#e8b84b', LO = '#d98a52';\n    return {\n      panel: [\n        { role: 'Apple Design Review', lens: 'Restraint, hierarchy, the 5-second feel' },\n        { role: 'Senior UX Researcher', lens: 'Flows, journeys, friction & dead ends' },\n        { role: 'UI / Visual Director', lens: 'Type, spacing, colour, rhythm, polish' },\n        { role: 'Mobile Experience Lead', lens: 'Thumb reach, density, touch targets' },\n        { role: 'Accessibility Expert', lens: 'Contrast, targets, keyboard, screen readers' },\n        { role: 'Information Architect', lens: 'Menu, discoverability, portal structure' },\n        { role: 'Conversion Strategist', lens: 'Trust, CTAs, action & momentum' },\n        { role: 'Brand Strategist', lens: 'Identity, emotion, credibility, story' },\n      ],\n      scores: [\n        { name: 'Visual Design', val: 71, pct: '71%', note: 'Disciplined token system & strong type pairing — undercut by ornament density, emoji icons and placeholder imagery.' },\n        { name: 'UX & Flow', val: 67, pct: '67%', note: 'Good in-portal nav and scroll-spy; no global search, no persistent portal switcher, very long single-scroll pages.' },\n        { name: 'Mobile Experience', val: 72, pct: '72%', note: 'Genuinely choreographed mobile hero and fluid type — but no sub-360px tier and 15 sections to scroll.' },\n        { name: 'Accessibility', val: 78, pct: '78%', note: 'Skip links, focus-visible rings, reduced-motion respected. Sub-lessons and the top 3 pages are weaker.' },\n        { name: 'Performance', val: 80, pct: '80%', note: 'Static, dependency-free, fast. Held back by 3.7k-line inline pages and six unsubsetted font families.' },\n        { name: 'Trust & Credibility', val: 66, pct: '66%', note: 'Real founder, candidates & manifesto build trust; placeholder media and unreviewed religious content erode it.' },\n        { name: 'Learning Experience', val: 70, pct: '70%', note: 'Five mature portals; Arabic/Urdu lag two tiers; no certificate-on-completion; media is schematic.' },\n      ],\n      strengths: [\n        'Brand & colour consistency is genuinely rare — the green/gold/cream token set is identical across all major pages.',\n        'A serious shared component layer (if-core, if-lesson, if-quiz, if-flashcards) with language sync, citations and PWA.',\n        'Five of seven learning portals are real platforms: hero → journey → full-anatomy lessons → progress → challenges.',\n        'Thoughtful mobile engineering — fluid clamp() type, a choreographed hero, glass nav, scroll-spy, reveal-on-scroll.',\n        'Accessibility fundamentals are present by default: skip link, focus rings, reduced-motion, semantic structure.',\n      ],\n      weaknesses: [\n        'The homepage leads with everything at once — 15 sections, a politician hero, gold ornament on every surface.',\n        'It reads as a \"local political party\" in the first 5 seconds, not as a calm, modern institution.',\n        'All rich media is placeholder; emoji stand in for a real icon system — both read as unfinished up close.',\n        'The three highest-traffic pages are off the shared layer; no global search across 7 portals & ~50 lessons.',\n        'SEO is weak-to-absent sitewide — no canonical, no JSON-LD; OG tags on only a third of pages.',\n      ],\n      audits: [\n        { num:'01', title:'First Impression', score:'6.0', color:'#b8742a', bg:'rgba(184,116,42,.08)',\n          body:'Within five seconds a visitor sees a deep-green hero, a garlanded founder portrait, Telugu display type and gold star-crescent ornament. It signals authenticity and local pride — but it signals \"election poster\" before it signals \"modern institution.\" Premium sites earn the first five seconds with one idea and a lot of silence; this hero competes with itself.',\n          points:[\n            { tag:'Trust', tcolor:'#1a7a3e', tbg:'rgba(26,122,62,.08)', head:'Credible, instantly.', text:'A named, photographed leader and real candidates build immediate legitimacy.' },\n            { tag:'Premium', tcolor:'#b8742a', tbg:'rgba(184,116,42,.08)', head:'Too much at once.', text:'Badge + title + subtitle + stats + manifesto + photo all fight for the same glance.' },\n            { tag:'Fix', tcolor:'#0d3b1e', tbg:'rgba(13,59,30,.06)', head:'One sentence, one image.', text:'Lead with a single human promise; let the proof live below the fold.' },\n          ]},\n        { num:'02', title:'Visual Design', score:'7.0', color:'#1a7a3e', bg:'rgba(26,122,62,.08)',\n          body:'The bones are good: a fluid clamp() type scale, a Playfair / Cormorant / DM Sans pairing, and a token set used consistently. What pulls it down is density — gold borders, gradients and glows on nearly every surface, two radius values (14 vs 16px) and two shadow definitions drifting across pages, and emoji doing the job of an icon system. Premium design is mostly subtraction.',\n          points:[\n            { tag:'Strong', tcolor:'#1a7a3e', tbg:'rgba(26,122,62,.08)', head:'Real type discipline.', text:'Fluid scale and a confident serif/sans pairing already beat most peers.' },\n            { tag:'Drift', tcolor:'#b8742a', tbg:'rgba(184,116,42,.08)', head:'Token inconsistency.', text:'Radius 14/16px and two shadow defs should collapse to one elevation scale.' },\n            { tag:'Fix', tcolor:'#0d3b1e', tbg:'rgba(13,59,30,.06)', head:'Retire the emoji.', text:'Commission one thin-line icon set; reserve gold for true emphasis only.' },\n          ]},\n        { num:'03', title:'Mobile Experience', score:'7.0', color:'#1a7a3e', bg:'rgba(26,122,62,.08)',\n          body:'This is a highlight — the mobile hero is genuinely choreographed (text and founder photo rebalance into a two-zone band), the nav collapses to a focus-managed drawer, and type scales fluidly. But the smallest tier sitewide is ~380px, so 320–360px is unverified and at risk; nav links and footer pills can fall under the 44px target; and a 15-section homepage is a long thumb-marathon.',\n          points:[\n            { tag:'Strong', tcolor:'#1a7a3e', tbg:'rgba(26,122,62,.08)', head:'Mobile-first is real.', text:'Choreographed hero, drawer nav, fluid type — not an afterthought.' },\n            { tag:'Risk', tcolor:'#b8742a', tbg:'rgba(184,116,42,.08)', head:'No sub-360 tier.', text:'Smallest budget phones likely show cramped headings & tight targets.' },\n            { tag:'Fix', tcolor:'#0d3b1e', tbg:'rgba(13,59,30,.06)', head:'Add reach & wayfinding.', text:'360px pass, 44px min targets, a sticky \"jump to\" bar and a bottom tab on portals.' },\n          ]},\n        { num:'04', title:'Information Architecture', score:'6.5', color:'#b8742a', bg:'rgba(184,116,42,.08)',\n          body:'In-portal navigation is good — fixed nav, scroll-spy, breadcrumbs on KC pages. At the system level it strains: seven portals and dozens of tools with no global search, no persistent cross-portal switcher (Arabic → Urdu means a round-trip to a hub), and the homepage / Knowledge-Center / guidance pages sitting off the shared layer with inconsistent affordances.',\n          points:[\n            { tag:'Gap', tcolor:'#b8742a', tbg:'rgba(184,116,42,.08)', head:'No site search.', text:'A content ecosystem this large with no search is a real discoverability hole.' },\n            { tag:'Gap', tcolor:'#b8742a', tbg:'rgba(184,116,42,.08)', head:'No \"continue learning\".', text:'Nothing surfaces where a learner left off across portals.' },\n            { tag:'Fix', tcolor:'#0d3b1e', tbg:'rgba(13,59,30,.06)', head:'Index + switcher.', text:'Prebuilt JSON search index in if-core plus a compact \"All Portals\" menu.' },\n          ]},\n        { num:'05', title:'Learning Portals', score:'7.0', color:'#1a7a3e', bg:'rgba(26,122,62,.08)',\n          body:'Seerah, Islamic History, Quran, Salah and Kids are real learning platforms with a full lesson anatomy and progress tracking — a strong achievement. But Arabic and Urdu are two tiers behind (no progress dashboard, no quiz, Urdu no flashcards), the 12 sub-lessons are static read-only chapters, no portal awards a certificate despite the engine supporting it, and all audio/video/illustration is placeholder.',\n          points:[\n            { tag:'Strong', tcolor:'#1a7a3e', tbg:'rgba(26,122,62,.08)', head:'Five mature portals.', text:'Full anatomy → progress → daily challenges. The model to copy everywhere.' },\n            { tag:'Gap', tcolor:'#b8742a', tbg:'rgba(184,116,42,.08)', head:'Arabic/Urdu lag.', text:'Static sub-lessons, no quiz/flashcard/progress parity — they read like a textbook.' },\n            { tag:'Fix', tcolor:'#0d3b1e', tbg:'rgba(13,59,30,.06)', head:'Reward the effort.', text:'Wire certificate-on-completion, streaks and an engagement-FX pack (respecting reduced-motion).' },\n          ]},\n        { num:'06', title:'Premium Experience', score:'5.5', color:'#b8742a', bg:'rgba(184,116,42,.08)',\n          body:'Measured against Apple / Stripe / Linear, the gap is restraint and finish. Those products win with one statement per screen, generous whitespace, real photography, and motion that rewards an action. This site instead decorates: ornament everywhere, placeholder media, fade-in-on-scroll as the only motion vocabulary, and no celebration when a learner achieves something. The palette is premium; the editing is not yet.',\n          points:[\n            { tag:'Why', tcolor:'#b8742a', tbg:'rgba(184,116,42,.08)', head:'Ornament ≠ premium.', text:'Gold on every surface flattens hierarchy — nothing feels special when everything glows.' },\n            { tag:'How they win', tcolor:'#1a7a3e', tbg:'rgba(26,122,62,.08)', head:'They remove.', text:'Whitespace, one idea per view, real imagery, purposeful motion.' },\n            { tag:'Fix', tcolor:'#0d3b1e', tbg:'rgba(13,59,30,.06)', head:'Edit ruthlessly.', text:'Halve homepage sections, replace placeholders with real photos, add reward motion.' },\n          ]},\n        { num:'07', title:'Accessibility', score:'7.5', color:'#1a7a3e', bg:'rgba(26,122,62,.08)',\n          body:'A relative strength. Skip-to-main links, focus-visible gold rings, reduced-motion handling and a semantic structure are present by default — ahead of most peer sites. Watch items: 13px nav links and small footer pills risk falling under the 44px target on mobile, muted-gold-on-cream body text should be contrast-checked, and the off-shared-layer pages lose the shared skip/glossary affordances.',\n          points:[\n            { tag:'Strong', tcolor:'#1a7a3e', tbg:'rgba(26,122,62,.08)', head:'Good by default.', text:'Skip link, focus rings, reduced-motion — the fundamentals are in.' },\n            { tag:'Check', tcolor:'#b8742a', tbg:'rgba(184,116,42,.08)', head:'Targets & contrast.', text:'Enforce 44px hit areas; verify muted-gold text hits 4.5:1.' },\n            { tag:'Fix', tcolor:'#0d3b1e', tbg:'rgba(13,59,30,.06)', head:'Unify the layer.', text:'Bring the top 3 pages onto if-core so a11y affordances are consistent.' },\n          ]},\n        { num:'08', title:'Performance & Perceived Speed', score:'7.5', color:'#1a7a3e', bg:'rgba(26,122,62,.08)',\n          body:'Static, dependency-free pages are inherently fast — a genuine advantage. The drag is on perceived polish: 3.7k-line inline pages, six font families loaded without subsetting or preload, and no skeletons or snap-scroll to make heavy pages feel instant. Loading experience is \"fine\" rather than \"effortless.\"',\n          points:[\n            { tag:'Strong', tcolor:'#1a7a3e', tbg:'rgba(26,122,62,.08)', head:'No framework tax.', text:'Pure static markup ships fast with nothing to hydrate.' },\n            { tag:'Cost', tcolor:'#b8742a', tbg:'rgba(184,116,42,.08)', head:'Font & DOM weight.', text:'Six families unsubsetted; very large single-file pages.' },\n            { tag:'Fix', tcolor:'#0d3b1e', tbg:'rgba(13,59,30,.06)', head:'Subset + skeletons.', text:'Preload/subset fonts, lazy-reveal sections, add skeleton loaders on lesson pages.' },\n          ]},\n        { num:'09', title:'Trust & Credibility', score:'6.5', color:'#b8742a', bg:'rgba(184,116,42,.08)',\n          body:'The trust signals are real: a named, photographed founder, identifiable candidates, a downloadable manifesto, concrete schemes. What undermines it is finish — placeholder galleries and \"coming soon\" media read as unfinished, and AI-drafted religious content shipping without a scholar sign-off is a credibility risk for exactly this audience. Trust is high on substance, fragile on polish.',\n          points:[\n            { tag:'Strong', tcolor:'#1a7a3e', tbg:'rgba(26,122,62,.08)', head:'Real people, real proof.', text:'Founder, candidates, manifesto and schemes are all concrete and named.' },\n            { tag:'Risk', tcolor:'#b8742a', tbg:'rgba(184,116,42,.08)', head:'Unreviewed content.', text:'Religious lessons are AI-drafted; a scholar pass is non-negotiable pre-launch.' },\n            { tag:'Fix', tcolor:'#0d3b1e', tbg:'rgba(13,59,30,.06)', head:'Show the receipts.', text:'Real event photos, press, scholar credits and a transparent \"about\" build durable trust.' },\n          ]},\n        { num:'10', title:'World-Class Benchmark', score:'5.5', color:'#b8742a', bg:'rgba(184,116,42,.08)',\n          body:'If Apple, Stripe or Airbnb redesigned this tomorrow, they would not touch the palette or the engineering — they would cut. Half the homepage sections would go; the hero would become one promise and one photograph; emoji would become a custom icon set; placeholders would become real photography; and every learner achievement would be celebrated. The distance to world-class is taste and editing, not capability.',\n          points:[\n            { tag:'They\\'d cut', tcolor:'#b8742a', tbg:'rgba(184,116,42,.08)', head:'15 → ~7 sections.', text:'A focused homepage that says one thing well beats an exhaustive one.' },\n            { tag:'They\\'d add', tcolor:'#1a7a3e', tbg:'rgba(26,122,62,.08)', head:'Real craft.', text:'Photography, an icon system, purposeful motion, search.' },\n            { tag:'Verdict', tcolor:'#0d3b1e', tbg:'rgba(13,59,30,.06)', head:'Closable gap.', text:'Top-tier in its category; a focused week of editing reaches the low 80s.' },\n          ]},\n      ],\n      tiers: [\n        { tag:'P0', color:'#e8b84b', title:'Do first — premium for low effort', meta:'~1 week · biggest ROI',\n          items: [\n            { n:'01', text:'Cut the homepage from 15 sections to ~7; lead with one human promise and one photograph.', effort:'Editorial' },\n            { n:'02', text:'Replace every emoji with a single commissioned thin-line icon set.', effort:'Design' },\n            { n:'03', text:'Swap placeholder galleries & media for real event / candidate / community photography.', effort:'Content' },\n            { n:'04', text:'Add a global client-side search (prebuilt JSON index of lessons, tools, terms).', effort:'Med' },\n            { n:'05', text:'Wire the top 3 pages (home, Knowledge Center, guidance) onto the if-core shared layer.', effort:'Low' },\n            { n:'06', text:'Add a 360px mobile tier and enforce 44px minimum touch targets sitewide.', effort:'Low' },\n            { n:'07', text:'Add SEO foundation: canonical + JSON-LD (Organization, Course, FAQ, Breadcrumb) + OG on every page.', effort:'Low' },\n            { n:'08', text:'Reduce ornament: one radius, one elevation scale, gold reserved for true emphasis only.', effort:'Low' },\n            { n:'09', text:'Add a sticky mobile \"jump to\" chip bar and a bottom tab bar on portals for thumb reach.', effort:'Med' },\n            { n:'10', text:'Subset & preload fonts; trim from six families toward three.', effort:'Low' },\n          ]},\n        { tag:'P1', color:'#bfe6c8', title:'Learning parity & engagement', meta:'~1–2 weeks',\n          items: [\n            { n:'11', text:'Bring Arabic & Urdu to parity: progress dashboard, daily challenge, quiz; flashcards for Urdu.', effort:'Med' },\n            { n:'12', text:'Convert the 12 static sub-lessons to interactive (quiz + mark-complete + next/prev + exercise).', effort:'Med' },\n            { n:'13', text:'Wire certificate-on-completion across every portal (engine already supports it).', effort:'Low' },\n            { n:'14', text:'Ship a shared engagement-FX pack — progress rings, correct-answer pulse, level-complete burst.', effort:'Med' },\n            { n:'15', text:'Add a persistent \"All Portals\" switcher and a \"continue where you left off\" entry point.', effort:'Med' },\n            { n:'16', text:'Add streaks / XP beyond Kids; surface spaced-repetition that already exists in if-flashcards.', effort:'Med' },\n            { n:'17', text:'Unify design tokens into if-shared.css; let pages override only intentionally.', effort:'Low' },\n            { n:'18', text:'Backfill thin portals toward ~8–10 lessons each (Quran, Salah, Seerah).', effort:'Content' },\n            { n:'19', text:'Add breadcrumbs to the Knowledge Center and guidance pages.', effort:'Low' },\n            { n:'20', text:'Cap reading line-length (~64ch), add pull-quotes and visual breaks to dense lessons.', effort:'Low' },\n          ]},\n        { tag:'P2', color:'#bdbdbd', title:'Depth, media & retention', meta:'Ongoing',\n          items: [\n            { n:'21', text:'Commission real maps (Hijrah route, empire expansion) and infographics (Five Pillars, Zakat).', effort:'Content' },\n            { n:'22', text:'Add real audio (Arabic/Urdu letters, duas, recitation) and salah / pronunciation video.', effort:'Content' },\n            { n:'23', text:'Professional illustrations & storyboards for Kids; consistent character continuity.', effort:'Content' },\n            { n:'24', text:'Build a global learner dashboard aggregating XP, streaks and progress across portals.', effort:'Med' },\n            { n:'25', text:'Add snap-scroll to journey/timeline sections and skeleton loaders to lesson pages.', effort:'Med' },\n            { n:'26', text:'Graded end-of-level exams via if-quiz; vary the formulaic reflection prompts.', effort:'Med' },\n            { n:'27', text:'Scholar-review sign-off on all religious content, with visible credits.', effort:'Content' },\n            { n:'28', text:'A real \"About / Impact\" page with press, photos and transparent leadership story.', effort:'Content' },\n            { n:'29', text:'Letter-tracing, drag-to-match vocab and tap-the-harakat interactions for language portals.', effort:'Med' },\n            { n:'30', text:'Optional accounts/sync — only if the pure-static constraint is intentionally relaxed.', effort:'Large' },\n          ]},\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
